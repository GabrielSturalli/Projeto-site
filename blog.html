<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230a0e13'/%3E%3Ctext x='32' y='45' font-family='Georgia,serif' font-style='italic' font-size='38' fill='%232dd4a7' text-anchor='middle'%3EG%3C/text%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Gabriel Sturalli</title>
<style>
  :root {
    --bg: #0a0e13;
    --bg-alt: #11161d;
    --card: #131920;
    --border: #212a35;
    --border-soft: #1b232c;
    --text: #eef1f4;
    --text-dim: #9aa7b4;
    --text-mute: #5b6b78;
    --accent: #2dd4a7;
    --accent-soft: rgba(45, 212, 167, 0.1);
    --ambar: #f0a63f;
    --font: 'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
    --serif: 'Source Serif 4', Georgia, serif;
    --mono: 'Consolas', 'SFMono-Regular', Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: auto; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    line-height: 1.7;
    min-height: 100vh;
  }
  a { color: var(--accent); text-decoration: none; }

  /* ---------- Preloader de entrada (nome digitado) ---------- */
  #preloader {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.45s ease;
  }
  #preloader.saindo { opacity: 0; pointer-events: none; }
  #preloader-typed {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(26px, 5vw, 42px);
    color: var(--text);
    letter-spacing: 0.5px;
  }
  #preloader-typed .caret {
    display: inline-block;
    width: 2px; height: 1em;
    background: var(--accent);
    margin-left: 4px;
    vertical-align: -0.12em;
    animation: caretBlink 0.85s steps(1) infinite;
  }
  @keyframes caretBlink { 50% { opacity: 0; } }

  /* ---------- Overlay de saída (transição entre páginas) ---------- */
  #exit-overlay {
    position: fixed; inset: 0; z-index: 9998;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
  }
  #exit-overlay.ativo { opacity: 1; pointer-events: all; }
  #exit-overlay span {
    font-family: var(--serif); font-style: italic;
    font-size: 16px; color: var(--accent);
  }

  /* ---------- Topbar ---------- */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(10, 14, 19, 0.82);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-soft);
  }
  .topbar-inner {
    max-width: 1040px; margin: 0 auto; padding: 0 24px;
    height: 68px; display: flex; align-items: center; justify-content: space-between;
  }
  .topbar a.voltar { font-size: 14px; font-weight: 600; }
  .topbar a.voltar:hover { text-decoration: underline; }
  .topbar .rotulo {
    font-family: var(--mono); font-size: 13.5px; color: var(--text-dim);
  }

  /* ---------- Container das vistas (lista <-> post) ---------- */
  #vista { transition: opacity 0.24s ease, transform 0.24s ease; }
  #vista.trocando { opacity: 0; transform: translateY(10px); }

  /* ---------- Cabeçalho da lista ---------- */
  .blog-hero { max-width: 1040px; margin: 0 auto; padding: 72px 24px 12px; }
  .eyebrow {
    font-family: var(--mono); font-size: 12.5px; letter-spacing: 0.12em;
    color: var(--accent); margin-bottom: 14px;
  }
  .blog-hero h1 {
    font-family: var(--serif); font-weight: 600;
    font-size: clamp(30px, 5vw, 46px); line-height: 1.15;
    letter-spacing: -0.5px; margin-bottom: 16px;
  }
  .blog-hero h1 em { color: var(--accent); font-style: italic; }
  .blog-hero .sub { color: var(--text-dim); max-width: 560px; font-size: 15.5px; }

  /* ---------- Filtro de tags ---------- */
  .tag-filtro {
    max-width: 1040px; margin: 0 auto; padding: 26px 24px 6px;
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .chip {
    font-family: var(--mono); font-size: 12.5px;
    color: var(--text-dim); background: transparent;
    border: 1px solid var(--border); border-radius: 999px;
    padding: 6px 14px; cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s, transform 0.2s;
  }
  .chip:hover { color: var(--text); border-color: var(--text-mute); transform: translateY(-1px); }
  .chip.ativa {
    color: var(--bg); background: var(--accent); border-color: var(--accent);
    font-weight: 700;
  }

  /* ---------- Grid de cards ---------- */
  .grid {
    max-width: 1040px; margin: 0 auto; padding: 28px 24px 90px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 26px;
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden; cursor: pointer;
    display: flex; flex-direction: column;
    opacity: 0; transform: translateY(26px);
    transition: opacity 0.55s cubic-bezier(.16,1,.3,1), transform 0.55s cubic-bezier(.16,1,.3,1),
                border-color 0.25s, box-shadow 0.25s;
  }
  .card.visivel { opacity: 1; transform: translateY(0); }
  .card:hover {
    border-color: var(--accent);
    box-shadow: 0 14px 38px rgba(0,0,0,0.45), 0 0 0 1px var(--accent);
    transform: translateY(-5px);
  }
  .card-img { height: 175px; overflow: hidden; position: relative; background: var(--bg-alt); }
  .card-img img, .card-img .capa-auto {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 0.6s cubic-bezier(.16,1,.3,1);
  }
  .card:hover .card-img img, .card:hover .card-img .capa-auto { transform: scale(1.06); }
  .capa-auto {
    display: flex; align-items: flex-end; padding: 14px 18px;
    background:
      radial-gradient(ellipse at 75% 20%, rgba(45,212,167,0.18), transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 34px, rgba(33,42,53,0.55) 34px, rgba(33,42,53,0.55) 35px),
      repeating-linear-gradient(90deg, transparent, transparent 34px, rgba(33,42,53,0.55) 34px, rgba(33,42,53,0.55) 35px),
      linear-gradient(155deg, #141b23, #0b0f14);
  }
  .capa-auto .letra {
    font-family: var(--serif); font-style: italic; font-weight: 600;
    font-size: 64px; line-height: 1; color: var(--accent); opacity: 0.9;
  }
  .card-body { padding: 20px 22px 22px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .card-meta { font-family: var(--mono); font-size: 12px; color: var(--text-mute); }
  .card-meta .tags { color: var(--accent); }
  .card h2 {
    font-family: var(--serif); font-weight: 600; font-size: 20px;
    line-height: 1.3; letter-spacing: -0.2px;
  }
  .card .resumo { color: var(--text-dim); font-size: 14px; flex: 1; }
  .card .ler {
    font-family: var(--mono); font-size: 12.5px; color: var(--accent);
    display: inline-flex; align-items: center; gap: 6px; margin-top: 4px;
  }
  .card .ler .seta { transition: transform 0.25s; display: inline-block; }
  .card:hover .ler .seta { transform: translateX(5px); }
  .grid-vazia {
    grid-column: 1 / -1; text-align: center; color: var(--text-mute);
    font-family: var(--mono); font-size: 13.5px; padding: 60px 0;
  }

  /* ---------- Vista de post ---------- */
  .post-hero {
    position: relative; height: 46vh; min-height: 280px; max-height: 480px;
    overflow: hidden; border-bottom: 1px solid var(--border-soft);
  }
  .post-hero .hero-img, .post-hero .capa-auto.hero {
    position: absolute; left: 0; top: -12%;
    width: 100%; height: 124%;
    object-fit: cover; will-change: transform;
  }
  .post-hero .capa-auto.hero { padding: 0 0 60px 40px; }
  .post-hero .capa-auto.hero .letra { font-size: 150px; }
  .post-hero .hero-grad {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(10,14,19,0.25) 0%, rgba(10,14,19,0) 35%, rgba(10,14,19,0.92) 96%);
    pointer-events: none;
  }
  .post { max-width: 760px; margin: 0 auto; padding: 34px 24px 90px; }
  .voltar-blog {
    font-family: var(--mono); font-size: 13px; display: inline-block; margin-bottom: 22px;
  }
  .voltar-blog:hover { text-decoration: underline; }
  .post-meta { font-family: var(--mono); font-size: 12.5px; color: var(--text-mute); margin-bottom: 12px; }
  .post-meta .tags { color: var(--accent); }
  .post h1 {
    font-family: var(--serif); font-weight: 600;
    font-size: clamp(26px, 4.6vw, 38px); line-height: 1.2;
    letter-spacing: -0.4px; margin-bottom: 26px;
  }
  .post-conteudo p { margin-bottom: 16px; color: var(--text-dim); font-size: 15.5px; }
  .post-conteudo strong { color: var(--text); }
  .post-conteudo em { color: var(--text); }
  .post-conteudo h2 {
    font-family: var(--serif); font-weight: 600; font-size: 23px;
    color: var(--text); margin: 34px 0 12px; line-height: 1.3;
  }
  .post-conteudo ul, .post-conteudo ol { padding-left: 1.3em; margin-bottom: 16px; color: var(--text-dim); }
  .post-conteudo li { margin-bottom: 8px; font-size: 15.5px; }
  .post-conteudo blockquote {
    background: var(--accent-soft); border-left: 3px solid var(--accent);
    border-radius: 0 10px 10px 0; padding: 16px 20px; margin: 22px 0;
    color: var(--text); font-size: 14.5px;
  }
  .post-conteudo img { max-width: 100%; border-radius: 10px; margin: 18px 0; display: block; }
  .post-fim {
    margin-top: 46px; padding-top: 24px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
  }
  .post-fim a { font-family: var(--mono); font-size: 13px; }
  .post-fim a:hover { text-decoration: underline; }

  footer {
    padding: 44px 24px; text-align: center;
    color: var(--text-mute); font-size: 13px;
    border-top: 1px solid var(--border-soft);
  }

  @media (max-width: 720px) {
    .post-hero { height: 34vh; min-height: 220px; }
    .post-hero .capa-auto.hero .letra { font-size: 96px; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<div id="preloader"><div id="preloader-typed"><span class="caret"></span></div></div>
<div id="exit-overlay"><span>Gabriel Sturalli</span></div>

<div class="topbar">
  <div class="topbar-inner">
    <a class="voltar" href="index.html">&larr; Voltar ao portfólio</a>
    <span class="rotulo">// blog</span>
  </div>
</div>

<div id="vista"></div>

<footer>© <span id="ano"></span> Gabriel Sturalli.</footer>

<script src="blog-posts.js"></script>
<script>
(function () {
  var POSTS = window.__BLOG_POSTS__ || [];
  var vista = document.getElementById('vista');
  var tagAtiva = 'todos';
  var pararParallax = null;

  document.getElementById('ano').textContent = new Date().getFullYear();

  // ---------- Preloader: digita o nome letra a letra ----------
  (function preloader() {
    var alvo = document.getElementById('preloader-typed');
    var caret = alvo.querySelector('.caret');
    var NOME = 'Gabriel Sturalli';
    var i = 0;
    var timer = setInterval(function () {
      i++;
      alvo.textContent = NOME.slice(0, i);
      alvo.appendChild(caret);
      if (i >= NOME.length) {
        clearInterval(timer);
        setTimeout(function () {
          document.getElementById('preloader').classList.add('saindo');
        }, 360);
      }
    }, 46);
  })();

  // ---------- Transição de saída para outras páginas .html ----------
  document.querySelectorAll('a[href$=".html"]:not([download])').forEach(function (a) {
    a.addEventListener('click', function (e) {
      e.preventDefault();
      document.getElementById('exit-overlay').classList.add('ativo');
      setTimeout(function () { window.location.href = a.getAttribute('href'); }, 400);
    });
  });

  // ---------- Utilitários ----------
  function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function capaHTML(post, hero) {
    if (post.imagem) {
      return '<img class="' + (hero ? 'hero-img' : '') + '" src="' + esc(post.imagem) + '" alt="Capa: ' + esc(post.titulo) + '">';
    }
    var letra = esc(post.titulo.trim().charAt(0).toUpperCase());
    return '<div class="capa-auto' + (hero ? ' hero' : '') + '"><span class="letra">' + letra + '</span></div>';
  }
  function todasAsTags() {
    var set = [];
    POSTS.forEach(function (p) {
      (p.tags || []).forEach(function (t) { if (set.indexOf(t) === -1) set.push(t); });
    });
    return set;
  }

  // ---------- Vista: lista de posts ----------
  function renderLista() {
    document.title = 'Blog — Gabriel Sturalli';
    var chips = ['todos'].concat(todasAsTags()).map(function (t) {
      return '<button class="chip' + (t === tagAtiva ? ' ativa' : '') + '" data-tag="' + esc(t) + '">' + esc(t) + '</button>';
    }).join('');

    var filtrados = tagAtiva === 'todos'
      ? POSTS
      : POSTS.filter(function (p) { return (p.tags || []).indexOf(tagAtiva) !== -1; });

    var cards = filtrados.map(function (p) {
      return (
        '<article class="card" data-slug="' + esc(p.slug) + '">' +
          '<div class="card-img">' + capaHTML(p, false) + '</div>' +
          '<div class="card-body">' +
            '<div class="card-meta">' + esc(p.data) + ' &middot; <span class="tags">' + (p.tags || []).map(esc).join(', ') + '</span></div>' +
            '<h2>' + esc(p.titulo) + '</h2>' +
            '<p class="resumo">' + esc(p.resumo) + '</p>' +
            '<span class="ler">Ler análise <span class="seta">&rarr;</span></span>' +
          '</div>' +
        '</article>'
      );
    }).join('');

    if (!cards) cards = '<div class="grid-vazia">Nenhum post com essa tag ainda.</div>';

    vista.innerHTML =
      '<header class="blog-hero">' +
        '<div class="eyebrow">// blog</div>' +
        '<h1>Comentários <em>&amp;</em> conjuntura</h1>' +
        '<p class="sub">Leituras sobre juros, inflação e os fatores que estou acompanhando no macro brasileiro — no formato curto de quem acompanha mercado todos os dias.</p>' +
      '</header>' +
      '<div class="tag-filtro">' + chips + '</div>' +
      '<main class="grid">' + cards + '</main>';

    // clique nos cards
    vista.querySelectorAll('.card').forEach(function (card) {
      card.addEventListener('click', function () {
        window.location.hash = 'post/' + card.getAttribute('data-slug');
      });
    });
    // filtro de tags
    vista.querySelectorAll('.chip').forEach(function (chip) {
      chip.addEventListener('click', function () {
        tagAtiva = chip.getAttribute('data-tag');
        renderLista();
        revelarCards();
      });
    });

    revelarCards();
  }

  // entrada animada dos cards, escalonada
  function revelarCards() {
    var cards = vista.querySelectorAll('.card');
    var io = new IntersectionObserver(function (entradas) {
      entradas.forEach(function (ent) {
        if (ent.isIntersecting) {
          ent.target.classList.add('visivel');
          io.unobserve(ent.target);
        }
      });
    }, { threshold: 0.08 });
    cards.forEach(function (card, i) {
      card.style.transitionDelay = Math.min(i * 70, 420) + 'ms';
      io.observe(card);
    });
    // fallback: garante visibilidade mesmo se o observer não disparar
    setTimeout(function () {
      cards.forEach(function (c) { c.classList.add('visivel'); });
    }, 1400);
  }

  // ---------- Vista: post individual ----------
  function renderPost(slug) {
    var post = null;
    POSTS.forEach(function (p) { if (p.slug === slug) post = p; });
    if (!post) { window.location.hash = ''; return; }

    document.title = post.titulo + ' — Gabriel Sturalli';

    vista.innerHTML =
      '<div class="post-hero">' + capaHTML(post, true) + '<div class="hero-grad"></div></div>' +
      '<article class="post">' +
        '<a class="voltar-blog" href="#">&larr; Todos os posts</a>' +
        '<div class="post-meta">' + esc(post.data) + ' &middot; <span class="tags">' + (post.tags || []).map(esc).join(', ') + '</span></div>' +
        '<h1>' + esc(post.titulo) + '</h1>' +
        '<div class="post-conteudo">' + post.conteudo + '</div>' +
        '<div class="post-fim">' +
          '<a href="#">&larr; Voltar ao blog</a>' +
          '<a href="index.html">Ir para o portfólio &rarr;</a>' +
        '</div>' +
      '</article>';

    // transição de saída também no link do rodapé do post
    vista.querySelectorAll('a[href$=".html"]').forEach(function (a) {
      a.addEventListener('click', function (e) {
        e.preventDefault();
        document.getElementById('exit-overlay').classList.add('ativo');
        setTimeout(function () { window.location.href = a.getAttribute('href'); }, 400);
      });
    });

    iniciarParallax();
  }

  // ---------- Parallax: a imagem de capa desce conforme a leitura ----------
  function iniciarParallax() {
    var img = vista.querySelector('.post-hero .hero-img, .post-hero .capa-auto.hero');
    if (!img) return;
    var ticking = false;
    function aplicar() {
      ticking = false;
      var y = window.scrollY * 0.38;
      img.style.transform = 'translateY(' + y.toFixed(1) + 'px)';
    }
    function aoRolar() {
      if (!ticking) { requestAnimationFrame(aplicar); ticking = true; }
    }
    window.addEventListener('scroll', aoRolar, { passive: true });
    aplicar();
    pararParallax = function () {
      window.removeEventListener('scroll', aoRolar);
      pararParallax = null;
    };
  }

  // ---------- Roteador por hash, com crossfade entre vistas ----------
  function rota() {
    var h = window.location.hash.replace(/^#\/?/, '');
    if (pararParallax) pararParallax();
    vista.classList.add('trocando');
    setTimeout(function () {
      window.scrollTo(0, 0);
      if (h.indexOf('post/') === 0) renderPost(h.slice(5));
      else renderLista();
      vista.classList.remove('trocando');
    }, 240);
  }

  window.addEventListener('hashchange', rota);

  // primeira renderização (sem esperar o crossfade)
  var h0 = window.location.hash.replace(/^#\/?/, '');
  if (h0.indexOf('post/') === 0) renderPost(h0.slice(5));
  else renderLista();
})();
</script>
</body>
</html>
